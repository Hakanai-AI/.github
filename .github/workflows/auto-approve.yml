name: Auto approve and merge Dependabot PRs (reusable)

on:
  workflow_call:
    secrets:
      RELEASE_BOT_CLIENT_ID:
        required: true
      RELEASE_BOT_PRIVATE_KEY:
        required: true

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: hakanai-runners
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Generate Hakanai Bot App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Approve Dependabot PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
            });

      - name: Enable auto-merge for Dependabot PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const mutation = `mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
              enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: $mergeMethod }) {
                pullRequest { id }
              }
            }`;
            const args = {
              pullRequestId: context.payload.pull_request.node_id,
              mergeMethod: 'SQUASH',
            };
            // Retry on UNSTABLE: enablePullRequestAutoMerge rejects when other
            // required checks are still running at the moment this step fires.
            // Sleep + retry rides out the race; eventual success once mergeStateStatus
            // becomes CLEAN or BEHIND. Total max wait: 30 + 60 + 120 = 210s.
            const delays = [30000, 60000, 120000];
            for (let attempt = 0; attempt <= delays.length; attempt++) {
              try {
                await github.graphql(mutation, args);
                core.info(`Auto-merge enabled${attempt > 0 ? ` after ${attempt} retry/retries` : ''}`);
                return;
              } catch (err) {
                const msg = err?.errors?.[0]?.message || err?.message || '';
                const isUnstable = msg.includes('unstable status');
                if (!isUnstable || attempt === delays.length) throw err;
                core.warning(`Attempt ${attempt + 1}: PR mergeStateStatus is unstable, retrying in ${delays[attempt] / 1000}s`);
                await new Promise(r => setTimeout(r, delays[attempt]));
              }
            }
