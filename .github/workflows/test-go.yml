name: Test - Go (reusable)

# Org-level reusable Go build+test workflow (ops#393 Phase 1). Mirrors the
# build step of the per-repo test-go.yml (e.g. Hakanai-AI/claude-plugin-line)
# plus a `go test ./...` step. goreleaser-dryrun and mcp-smoke stay inline
# per-repo (plugin-specific) — not extracted here.

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version to install (e.g. '1.23')."
        type: string
        default: "1.23"
    secrets:
      PAT:
        description: "GitHub PAT for private Hakanai-AI module access. Pass secrets.PAT."
        required: true

env:
  GOPRIVATE: github.com/Hakanai-AI,github.com/chenjr0719
  GONOSUMCHECK: github.com/Hakanai-AI,github.com/chenjr0719

jobs:
  test-go:
    runs-on: hakanai-runners
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Configure private module access
        uses: Hakanai-AI/.github/actions/setup-private-modules@main
        with:
          pat: ${{ secrets.PAT }}

      - name: Install dependencies
        run: go mod download -x && go mod tidy -v

      - name: Verify go.mod and go.sum are tidy
        # `go mod tidy` above may rewrite go.mod/go.sum; fail if it did, so the
        # drift is fixed + committed in-repo rather than silently masked. Without
        # this, a tag push later fails goreleaser with "git is in a dirty state"
        # (ops#237). Restores the guard the per-repo inline test-go had.
        run: |
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod or go.sum changed after 'go mod tidy'. Run 'go mod tidy' locally and commit the result."
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
