name: MCP smoke test
description: >-
  Build a Go channel-plugin binary and run an MCP JSON-RPC "initialize"
  handshake over stdio (ops#342 canary, extracted for fleet reuse — ops#287).
  Asserts: valid JSON-RPC 2.0 response with result.protocolVersion present,
  no panic: in stderr, no "flag provided but not defined".

  CALLER RESPONSIBILITY: set plugin-specific dummy env vars at the job level
  (e.g. LINE_CHANNEL_ACCESS_TOKEN / LINE_CHANNEL_SECRET for the line plugin,
  DISCORD_BOT_TOKEN for the discord plugin). The action does not know which
  plugin it is building, so it cannot inject those vars itself. Any env var
  the binary reads on startup must be present; dummy/placeholder values are
  fine — the smoke only verifies the MCP handshake, not the upstream service.

  The action is self-contained: it runs setup-go, configures private-module
  access, downloads deps, builds the binary, and runs the handshake. The
  calling job only needs to have run actions/checkout first.

inputs:
  binary_cmd:
    description: >-
      Go package path to build (passed to `go build -o`).
      Example: ./cmd/line-plugin
    required: true
  binary_name:
    description: Filename for the built binary. Example: line-plugin
    required: true
  mcp_timeout:
    description: Seconds to wait for the MCP initialize response.
    required: false
    default: "15"
  pat:
    description: >-
      GitHub PAT for private Go module access (github.com/Hakanai-AI).
      Pass secrets.PAT — composite actions cannot read secrets directly.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ./go.mod
        cache: false

    - name: Prepare Go cache paths
      shell: bash
      run: |
        echo "GOMODCACHE=$(go env GOMODCACHE)" >> "$GITHUB_ENV"
        echo "GOCACHE=$(go env GOCACHE)"       >> "$GITHUB_ENV"
        echo "GOVERSION=$(go env GOVERSION | tr -d 'go')" >> "$GITHUB_ENV"

    - name: Cache Go modules and build cache
      uses: actions/cache@v6
      with:
        path: |
          ${{ env.GOMODCACHE }}
          ${{ env.GOCACHE }}
        key: setup-go-${{ runner.os }}-go-${{ env.GOVERSION }}-${{ hashFiles('go.sum') }}
        restore-keys: |
          setup-go-${{ runner.os }}-

    - name: Configure private module access
      shell: bash
      run: git config --global url."https://${{ inputs.pat }}@github.com/".insteadOf "https://github.com/"

    - name: Download dependencies
      shell: bash
      env:
        GOPRIVATE: github.com/Hakanai-AI,github.com/chenjr0719
        GONOSUMCHECK: github.com/Hakanai-AI,github.com/chenjr0719
      run: go mod download

    - name: Build plugin binary
      shell: bash
      env:
        CGO_ENABLED: "0"
        GOPRIVATE: github.com/Hakanai-AI,github.com/chenjr0719
        GONOSUMCHECK: github.com/Hakanai-AI,github.com/chenjr0719
      run: |
        BUILD_DIR="$(mktemp -d -t mcp-smoke-build-XXXXXX)"
        BINARY="${BUILD_DIR}/${{ inputs.binary_name }}"
        echo "MCP_SMOKE_BINARY=${BINARY}" >> "$GITHUB_ENV"
        echo "[smoke] building ${{ inputs.binary_cmd }} → ${BINARY}"
        go build -o "$BINARY" "${{ inputs.binary_cmd }}"
        echo "[smoke] build OK ($(du -sh "$BINARY" | cut -f1))"

    - name: MCP initialize handshake
      shell: bash
      env:
        BINARY: ${{ env.MCP_SMOKE_BINARY }}
        MCP_TIMEOUT: ${{ inputs.mcp_timeout }}
      run: bash "${{ github.action_path }}/run-handshake.sh"
