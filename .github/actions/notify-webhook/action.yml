name: Notify webhook
description: >-
  POST an HMAC-signed CloudEvent to webhooks.hakanai.ai with the CI result.
  Org-level single source of truth for the per-repo notify-webhook step (ops#287).
  Drop into a job that `needs:` the jobs you want to report, with `if: always()`.

inputs:
  status:
    description: Result to report (e.g. ${{ needs.test-go.result }}).
    required: true
  webhook_secret:
    description: HMAC secret. Pass ${{ secrets.WEBHOOK_SECRET }} (composite actions can't read secrets directly).
    required: true
  webhook_url:
    description: Override the webhook endpoint.
    required: false
    default: https://webhooks.hakanai.ai/webhook/github

runs:
  using: composite
  steps:
    - name: Notify webhook
      shell: bash
      continue-on-error: true
      env:
        WEBHOOK_URL: ${{ inputs.webhook_url }}
        WEBHOOK_SECRET: ${{ inputs.webhook_secret }}
        STATUS: ${{ inputs.status }}
      run: |
        PAYLOAD=$(jq -nc \
          --arg repo "${{ github.repository }}" \
          --arg workflow "${{ github.workflow }}" \
          --argjson run_id ${{ github.run_id }} \
          --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          --arg branch "${{ github.head_ref || github.ref_name }}" \
          --arg sha "${{ github.sha }}" \
          --arg event "${{ github.event_name }}" \
          --arg pr_number "${{ github.event.pull_request.number || '' }}" \
          --arg status "$STATUS" \
          --arg actor "${{ github.actor }}" \
          '{repo: $repo, workflow: $workflow, run_id: $run_id, run_url: $run_url, branch: $branch, sha: $sha, event: $event, pr_number: $pr_number, status: $status, actor: $actor}')

        SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')

        curl -s -X POST "$WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
          -H "Ce-Type: github.workflow_run" \
          -H "Ce-Source: github/${{ github.repository }}" \
          -H "Ce-Id: ${{ github.run_id }}-${{ github.run_attempt }}" \
          -H "Ce-Specversion: 1.0" \
          -d "$PAYLOAD"
