name: MCP config lint
description: >-
  Static guard on a plugin's .mcp.json against the ops#337 canonical launcher
  pattern. Asserts, for every server entry:
    1. command == "node"
    2. args[0] ends with launcher.mjs (the per-plugin Node launcher)
    3. no command/arg references the archived Go "claude-plugin-launcher"
    4. env == {}  (config comes from the plugin's own dotenv at
       ~/.claude/channels/<plugin>/.env, NOT .mcp.json env injection)

  This is the recurrence-preventer for the 2026-06-27 CG/gmeet plugin-update
  outage: a release shipped a .mcp.json invoking the archived launcher binary
  (ENOENT) and injecting CHANNEL_GATEWAY_MCP_ENDPOINT=${...} (unset -> empty ->
  overrode the client default -> -32000). Sibling to the mcp-smoke action
  (runtime handshake); this one is the cheap static check.

  Self-contained: the calling job only needs actions/checkout first. No Go,
  no secrets, no network.

inputs:
  mcp_json_path:
    description: Path to the .mcp.json to lint.
    required: false
    default: .mcp.json

runs:
  using: composite
  steps:
    - name: Lint .mcp.json against the canonical launcher pattern
      shell: bash
      run: |
        "${{ github.action_path }}/lint.sh" "${{ inputs.mcp_json_path }}"
